<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Downloader</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    font-family:Arial;
    color:white;
}

.container{
    background:#111;
    padding:40px;
    border-radius:15px;
    width:420px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    text-align:center;
}

h1{
    margin-bottom:25px;
}

.inputBox{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

.download{
    width:100%;
    margin-top:15px;
    background:#4CAF50;
    color:white;
}

.download:hover{
    background:#3ca043;
}

.paste{
    background:#2196F3;
    color:white;
}

.paste:hover{
    background:#1976D2;
}

.status{
    margin-top:15px;
    font-size:14px;
    color:#aaa;
}

.progress{
    width:100%;
    height:8px;
    background:#333;
    border-radius:5px;
    margin-top:10px;
    overflow:hidden;
}

.bar{
    width:0%;
    height:100%;
    background:#4CAF50;
    transition:width .4s;
}

.footer{
    margin-top:20px;
    font-size:12px;
    opacity:.6;
}

</style>
</head>

<body>

<div class="container">

<h1>Video Downloader</h1>

<div class="inputBox">
<input id="videoURL" placeholder="Paste video URL here">
<button class="paste" onclick="pasteLink()">Paste</button>
</div>

<button class="download" onclick="downloadVideo()">Download Video</button>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="status" id="status">Waiting for link...</div>

<div class="footer">
Supports direct video files (.mp4, .webm, .mov)
</div>

</div>

<script>

const input = document.getElementById("videoURL")
const statusText = document.getElementById("status")
const progress = document.getElementById("progressBar")

async function pasteLink(){
    try{
        const text = await navigator.clipboard.readText()
        input.value = text
        statusText.innerText = "Link pasted!"
    }catch{
        statusText.innerText = "Clipboard access denied"
    }
}

function simulateProgress(){
    let value = 0
    progress.style.width="0%"
    
    const interval = setInterval(()=>{
        value+=10
        progress.style.width=value+"%"
        
        if(value>=100){
            clearInterval(interval)
        }
    },120)
}

function downloadVideo(){

    const url = input.value.trim()

    if(url === ""){
        statusText.innerText="⚠ Please enter a video link"
        return
    }

    if(!url.startsWith("http")){
        statusText.innerText="⚠ Invalid URL"
        return
    }

    statusText.innerText="Preparing download..."
    simulateProgress()

    const link = document.createElement("a")

    const filename = "video_" + Date.now() + ".mp4"

    link.href = url
    link.download = filename

    document.body.appendChild(link)
    link.click()
    document.body.removeChild(link)

    statusText.innerText="Download started ✔"

}

input.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        downloadVideo()
    }
})

</script>

</body>
</html>
